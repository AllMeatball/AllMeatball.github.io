<!DOCTYPE html>
<head>
<title>Bitmap Font Converter</title>
<link rel="stylesheet" type="text/css" href="css/style.css">
<link rel="stylesheet" type="text/css" href="css/font-preview.css">

<link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
<script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

</head>
<body>

<h1>Bitmap Font Converter</h1>
<p id="tagline">Convert bitmap fonts to other bitmap fonts</p>

<div id="preloader">
<h2 id="preloader-loading">Loading...</h2>
<p id="preloader-msg">Waiting for PyScript to start...</p>
</div>


<div id="app" hidden>

<fieldset>
    <legend>import</legend>

    <label for="import-format">format</label>
    <select name="import-format" id="import-format"></select><br><br>

    <div>
    <input hidden type="file" id="font-upload" name="file"></input>
    <button id="font-upload-button">Choose file</button>
    <span   id="font-upload-name">No file chosen</span>
    </div>

</fieldset>

<fieldset>
    <legend>export</legend>

    <label for="export-format">format</label>
    <select name="export-format" id="export-format"></select><br><br>
    <button id="convert-button">Convert</button>
</fieldset>

<fieldset>
    <legend>preview</legend>
    <img hidden id="preview" title="Click to preview image" alt="Preview">
</fieldset>
</div>

<script type="py" config="py/config.json" src="py/main.py"></script>

<div class="footer">
    <a href="https://github.com/robhagemans/monobit" target="_blank">monobit (under MIT)</a> <span>- Copyright (c) 2019--2023 Rob Hagemans</span><br>
    <a href="https://github.com/tgies/klattsch/blob/10814befa782a485fd5c19cefe5f534d3635b321/src/style.css" target="_blank">klattsch style.css (under MIT)</a> <span>- Copyright (c) 2026 Tony Gies<span>
</div>
</body>
